<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Arcane Self | Journal</title>

<link rel="stylesheet" href="../css/style.css">

<style>
.journal-page{
  padding:2rem 0;
}

.page-header{
  text-align:center;
  margin-bottom:2rem;
}

.page-header h1{
  color:var(--secondary);
}

.entry-card{
  margin-bottom:1rem;
}

.entry-date{
  color:var(--cyan);
  font-weight:700;
  margin-bottom:.5rem;
}

.empty-state{
  text-align:center;
  color:var(--text-muted);
  padding:2rem;
}
</style>
</head>
<body>

<div class="container journal-page">

  <div class="page-header">
    <h1>📔 Journal</h1>
    <p>Your personal growth records.</p>
  </div>

  <div id="journalContainer">

    <div class="empty-state">
      No entries found yet.
    </div>

  </div>

  <div class="text-center mt-4">

    <a href="../dashboard.html">
      <button class="arcane-btn">
        Return To Dashboard
      </button>
    </a>

  </div>

</div>

<script src="../js/storage.js"></script>
<script src="../js/utils.js"></script>

<script>
if(!characterExists()){
  window.location.href = "../create.html";
}

const data = getData();
const container =
  document.getElementById("journalContainer");

if(data.checkIns.length > 0){

  container.innerHTML = "";

  [...data.checkIns]
    .reverse()
    .forEach(entry => {

      const card =
        document.createElement("div");

      card.className =
        "arcane-card entry-card";

      card.innerHTML = `
        <div class="entry-date">
          ${formatDate(entry.date)}
        </div>

        <h3>${entry.habit}</h3>

        <p>
          ${capitalize(entry.stat)}
          • +${entry.xp} XP
        </p>
      `;

      container.appendChild(card);
    });
}
</script>

</body>
</html>
