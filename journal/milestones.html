<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Arcane Self | Milestones</title>

<link rel="stylesheet" href="../css/style.css">

<style>
.milestones-page{
  padding:2rem 0;
}

.page-header{
  text-align:center;
  margin-bottom:2rem;
}

.page-header h1{
  color:var(--secondary);
}

.milestone-card{
  text-align:center;
}

.milestone-number{
  font-size:2.5rem;
  font-weight:700;
  color:var(--secondary);
  margin-bottom:1rem;
}

.complete{
  border-color:var(--success);
  box-shadow:0 0 20px rgba(16,185,129,.25);
}

.pending{
  opacity:.7;
}

.status{
  margin-top:1rem;
  color:var(--cyan);
  font-weight:700;
}
</style>
</head>
<body>

<div class="container milestones-page">

  <div class="page-header">
    <h1>🎯 Milestones</h1>
    <p>Major progression checkpoints.</p>
  </div>

  <div class="grid grid-3">

    <div id="xp500" class="arcane-card milestone-card pending">
      <div class="milestone-number">500</div>
      <h3>Total XP</h3>
      <p>Reach 500 XP</p>
      <div class="status">Pending</div>
    </div>

    <div id="xp1500" class="arcane-card milestone-card pending">
      <div class="milestone-number">1500</div>
      <h3>Total XP</h3>
      <p>Reach 1500 XP</p>
      <div class="status">Pending</div>
    </div>

    <div id="xp3500" class="arcane-card milestone-card pending">
      <div class="milestone-number">3500</div>
      <h3>Total XP</h3>
      <p>Reach 3500 XP</p>
      <div class="status">Pending</div>
    </div>

    <div id="streak7" class="arcane-card milestone-card pending">
      <div class="milestone-number">7</div>
      <h3>Day Streak</h3>
      <p>Maintain a 7 day streak</p>
      <div class="status">Pending</div>
    </div>

    <div id="streak30" class="arcane-card milestone-card pending">
      <div class="milestone-number">30</div>
      <h3>Day Streak</h3>
      <p>Maintain a 30 day streak</p>
      <div class="status">Pending</div>
    </div>

    <div id="rankS" class="arcane-card milestone-card pending">
      <div class="milestone-number">S</div>
      <h3>Rank</h3>
      <p>Reach S Rank</p>
      <div class="status">Pending</div>
    </div>

  </div>

  <div class="text-center mt-4">
    <a href="../dashboard.html">
      <button class="arcane-btn">
        Return To Dashboard
      </button>
    </a>
  </div>

</div>

<script src="../js/storage.js"></script>
<script src="../js/utils.js"></script>

<script>
if(!characterExists()){
  window.location.href = "../create.html";
}

const data = getData();

function complete(id){

  const card = document.getElementById(id);

  card.classList.remove("pending");
  card.classList.add("complete");

  card.querySelector(".status").textContent =
    "Completed";
}

if(data.totalXP >= 500) complete("xp500");
if(data.totalXP >= 1500) complete("xp1500");
if(data.totalXP >= 3500) complete("xp3500");

if(data.streaks.longest >= 7) complete("streak7");
if(data.streaks.longest >= 30) complete("streak30");

if(data.rank === "S") complete("rankS");
</script>

</body>
</html>
