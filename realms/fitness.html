<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Arcane Self | Fitness Realm</title>

<link rel="stylesheet" href="../css/style.css">

<style>
.realm-page{
  padding:2rem 0;
}

.realm-header{
  text-align:center;
  margin-bottom:2rem;
}

.realm-header h1{
  color:var(--secondary);
}

.realm-banner{
  text-align:center;
  padding:2rem;
  margin-bottom:2rem;
}

.realm-icon{
  font-size:4rem;
  margin-bottom:1rem;
}

.quest-grid{
  margin-top:2rem;
}

.quest-card{
  text-align:center;
}

.realm-stat{
  font-size:2rem;
  color:var(--secondary);
  font-weight:700;
}

.reward{
  color:var(--cyan);
  margin-top:.5rem;
}
</style>
</head>
<body>

<div class="container realm-page">

  <div class="realm-header">
    <h1>⚔️ Fitness Realm</h1>
    <p>Forge your body. Increase Strength and Vitality.</p>
  </div>

  <div class="arcane-card realm-banner">

    <div class="realm-icon">💪</div>

    <h2>Current Strength</h2>

    <div id="strengthLevel" class="realm-stat">
      Lv.1
    </div>

  </div>

  <div class="grid grid-3 quest-grid">

    <div class="arcane-card quest-card">

      <h3>Morning Workout</h3>

      <p>Complete a workout session.</p>

      <div class="reward">
        +30 Strength XP
      </div>

      <button
        class="arcane-btn mt-2"
        onclick="completeStrengthQuest()">
        Complete Quest
      </button>

    </div>

    <div class="arcane-card quest-card">

      <h3>10,000 Steps</h3>

      <p>Stay active throughout the day.</p>

      <div class="reward">
        +30 Vitality XP
      </div>

      <button
        class="arcane-btn mt-2"
        onclick="completeVitalityQuest()">
        Complete Quest
      </button>

    </div>

    <div class="arcane-card quest-card">

      <h3>Stretching Session</h3>

      <p>Improve mobility and recovery.</p>

      <div class="reward">
        +30 Vitality XP
      </div>

      <button
        class="arcane-btn mt-2"
        onclick="completeVitalityQuest()">
        Complete Quest
      </button>

    </div>

  </div>

  <div class="text-center mt-4">

    <a href="../dashboard.html">
      <button class="arcane-btn">
        Return To Dashboard
      </button>
    </a>

  </div>

</div>

<script src="../js/storage.js"></script>
<script src="../js/utils.js"></script>

<script>
if(!characterExists()){
  window.location.href = "../create.html";
}

function loadRealm(){

  const data = getData();

  document.getElementById("strengthLevel").textContent =
    `Lv.${data.stats.strength.level}`;
}

function completeStrengthQuest(){

  addXP("strength",30);

  alert("Quest Complete! +30 Strength XP");

  loadRealm();
}

function completeVitalityQuest(){

  addXP("vitality",30);

  alert("Quest Complete! +30 Vitality XP");

  loadRealm();
}

loadRealm();
</script>

</body>
</html>
