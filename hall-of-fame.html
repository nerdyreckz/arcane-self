<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Arcane Self | Hall of Fame</title>

<link rel="stylesheet" href="css/style.css">

<style>
.hof-page{
  padding:2rem 0;
}

.hof-header{
  text-align:center;
  margin-bottom:2rem;
}

.hof-header h1{
  color:var(--secondary);
}

.hero-card{
  text-align:center;
  margin-bottom:2rem;
}

.rank-display{
  font-size:5rem;
  color:var(--secondary);
  margin:1rem 0;
}

.achievement-grid{
  margin-top:2rem;
}

.achievement-card{
  text-align:center;
}

.achievement-icon{
  font-size:3rem;
  margin-bottom:1rem;
}

.legend-title{
  color:var(--secondary);
}
</style>
</head>
<body>

<div class="container hof-page">

  <div class="hof-header">
    <h1>🏆 Hall of Fame</h1>
    <p>The legacy of your Arcane Self.</p>
  </div>

  <div class="arcane-card hero-card glow">

    <h2 id="characterName">Hunter</h2>

    <div id="rankDisplay" class="rank-display">
      E
    </div>

    <p>Current Rank</p>

    <div class="mt-3">
      <h3>Total XP</h3>
      <p id="totalXP">0 XP</p>
    </div>

    <div class="mt-3">
      <h3>Power Level</h3>
      <p id="powerLevel">0</p>
    </div>

  </div>

  <h2 class="text-center legend-title mb-3">
    Legendary Milestones
  </h2>

  <div class="grid grid-3 achievement-grid">

    <div class="arcane-card achievement-card">
      <div class="achievement-icon">⚔️</div>
      <h3>First Steps</h3>
      <p>Created your Arcane Self.</p>
    </div>

    <div class="arcane-card achievement-card">
      <div class="achievement-icon">🔥</div>
      <h3>Streak Keeper</h3>
      <p>Maintain discipline daily.</p>
    </div>

    <div class="arcane-card achievement-card">
      <div class="achievement-icon">👑</div>
      <h3>Future Monarch</h3>
      <p>One day reach S Rank.</p>
    </div>

  </div>

  <div class="text-center mt-4">

    <a href="dashboard.html">
      <button class="arcane-btn">
        Return To Dashboard
      </button>
    </a>

  </div>

</div>

<script src="js/storage.js"></script>
<script src="js/utils.js"></script>

<script>
if(!characterExists()){
  window.location.href = "create.html";
}

const data = getData();

document.getElementById("characterName").textContent =
  data.character.name;

document.getElementById("rankDisplay").textContent =
  data.rank;

document.getElementById("totalXP").textContent =
  formatXP(data.totalXP);

document.getElementById("powerLevel").textContent =
  getPowerLevel();
</script>

</body>
</html>
