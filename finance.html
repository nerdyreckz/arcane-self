<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Arcane Self | Finance Realm</title>

<link rel="stylesheet" href="../css/style.css">

<style>
.realm-page{
  padding:2rem 0;
}

.realm-header{
  text-align:center;
  margin-bottom:2rem;
}

.realm-header h1{
  color:var(--secondary);
}

.realm-banner{
  text-align:center;
  padding:2rem;
  margin-bottom:2rem;
}

.realm-icon{
  font-size:4rem;
  margin-bottom:1rem;
}

.realm-stat{
  font-size:2rem;
  color:var(--secondary);
  font-weight:700;
}

.quest-card{
  text-align:center;
}

.reward{
  color:var(--cyan);
  margin-top:.5rem;
}
</style>
</head>
<body>

<div class="container realm-page">

  <div class="realm-header">
    <h1>💰 Finance Realm</h1>
    <p>Build wealth, discipline, and long-term stability.</p>
  </div>

  <div class="arcane-card realm-banner">

    <div class="realm-icon">🏦</div>

    <h2>Current Wisdom</h2>

    <div id="wisdomLevel" class="realm-stat">
      Lv.1
    </div>

  </div>

  <div class="grid grid-3">

    <div class="arcane-card quest-card">

      <h3>Track Expenses</h3>

      <p>Record today's spending.</p>

      <div class="reward">
        +30 Wisdom XP
      </div>

      <button class="arcane-btn mt-2"
        onclick="completeWisdomQuest()">
        Complete Quest
      </button>

    </div>

    <div class="arcane-card quest-card">

      <h3>Save Money</h3>

      <p>Add to savings or investments.</p>

      <div class="reward">
        +30 Willpower XP
      </div>

      <button class="arcane-btn mt-2"
        onclick="completeWillpowerQuest()">
        Complete Quest
      </button>

    </div>

    <div class="arcane-card quest-card">

      <h3>Financial Learning</h3>

      <p>Read about money, investing, or business.</p>

      <div class="reward">
        +30 Wisdom XP
      </div>

      <button class="arcane-btn mt-2"
        onclick="completeWisdomQuest()">
        Complete Quest
      </button>

    </div>

  </div>

  <div class="text-center mt-4">
    <a href="../dashboard.html">
      <button class="arcane-btn">
        Return To Dashboard
      </button>
    </a>
  </div>

</div>

<script src="../js/storage.js"></script>
<script src="../js/utils.js"></script>

<script>
if(!characterExists()){
  window.location.href = "../create.html";
}

function loadRealm(){
  const data = getData();

  document.getElementById("wisdomLevel").textContent =
    `Lv.${data.stats.wisdom.level}`;
}

function completeWisdomQuest(){
  addXP("wisdom",30);
  alert("Quest Complete! +30 Wisdom XP");
  loadRealm();
}

function completeWillpowerQuest(){
  addXP("willpower",30);
  alert("Quest Complete! +30 Willpower XP");
  loadRealm();
}

loadRealm();
</script>

</body>
</html>
