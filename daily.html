<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Arcane Self | Daily Quests</title>

<link rel="stylesheet" href="../css/style.css">

<style>
.daily-page{
  padding:2rem 0;
}

.page-header{
  text-align:center;
  margin-bottom:2rem;
}

.page-header h1{
  color:var(--secondary);
}

.quest-card{
  text-align:center;
}

.reward{
  color:var(--cyan);
  margin-top:.5rem;
}
</style>
</head>
<body>

<div class="container daily-page">

  <div class="page-header">
    <h1>☀️ Daily Quests</h1>
    <p>Complete these every day to grow stronger.</p>
  </div>

  <div class="grid grid-3">

    <div class="arcane-card quest-card">
      <h3>Morning Meditation</h3>
      <p>Focus your mind for 10 minutes.</p>
      <div class="reward">+30 Mana XP</div>

      <button class="arcane-btn mt-2"
        onclick="completeQuest('mana')">
        Complete
      </button>
    </div>

    <div class="arcane-card quest-card">
      <h3>Workout</h3>
      <p>Train your body.</p>
      <div class="reward">+30 Strength XP</div>

      <button class="arcane-btn mt-2"
        onclick="completeQuest('strength')">
        Complete
      </button>
    </div>

    <div class="arcane-card quest-card">
      <h3>Read 20 Pages</h3>
      <p>Increase your knowledge.</p>
      <div class="reward">+30 Wisdom XP</div>

      <button class="arcane-btn mt-2"
        onclick="completeQuest('wisdom')">
        Complete
      </button>
    </div>

  </div>

  <div class="text-center mt-4">
    <a href="quest-board.html">
      <button class="arcane-btn">
        Back To Quest Board
      </button>
    </a>
  </div>

</div>

<script src="../js/storage.js"></script>
<script src="../js/utils.js"></script>

<script>
if(!characterExists()){
  window.location.href = "../create.html";
}

function completeQuest(stat){

  addXP(stat,30);

  alert(`Quest Complete! +30 ${capitalize(stat)} XP`);
}
</script>

</body>
</html>
