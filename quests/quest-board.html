<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Arcane Self | Quest Board</title>

<link rel="stylesheet" href="../css/style.css">

<style>
.quest-page{
  padding:2rem 0;
}

.page-header{
  text-align:center;
  margin-bottom:2rem;
}

.page-header h1{
  color:var(--secondary);
}

.quest-card{
  text-align:center;
}

.quest-icon{
  font-size:3rem;
  margin-bottom:1rem;
}
</style>
</head>
<body>

<div class="container quest-page">

  <div class="page-header">
    <h1>📜 Quest Board</h1>
    <p>Select your mission.</p>
  </div>

  <div class="grid grid-3">

    <div class="arcane-card quest-card">
      <div class="quest-icon">☀️</div>
      <h3>Daily Quests</h3>
      <p>Small tasks. Consistent growth.</p>

      <a href="daily.html">
        <button class="arcane-btn mt-2">
          Open
        </button>
      </a>
    </div>

    <div class="arcane-card quest-card">
      <div class="quest-icon">📅</div>
      <h3>Weekly Quests</h3>
      <p>Bigger challenges and rewards.</p>

      <a href="weekly.html">
        <button class="arcane-btn mt-2">
          Open
        </button>
      </a>
    </div>

    <div class="arcane-card quest-card">
      <div class="quest-icon">🗓️</div>
      <h3>Monthly Quests</h3>
      <p>Major milestones and progression.</p>

      <a href="monthly.html">
        <button class="arcane-btn mt-2">
          Open
        </button>
      </a>
    </div>

  </div>

  <div class="text-center mt-4">
    <a href="../dashboard.html">
      <button class="arcane-btn">
        Return To Dashboard
      </button>
    </a>
  </div>

</div>

</body>
</html>
