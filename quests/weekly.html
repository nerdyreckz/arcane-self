<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Arcane Self | Weekly Quests</title>

<link rel="stylesheet" href="../css/style.css">

<style>
.weekly-page{
  padding:2rem 0;
}

.page-header{
  text-align:center;
  margin-bottom:2rem;
}

.page-header h1{
  color:var(--secondary);
}

.quest-card{
  text-align:center;
}

.reward{
  color:var(--cyan);
  margin-top:.5rem;
}

.bonus{
  color:var(--secondary);
  font-weight:700;
}
</style>
</head>
<body>

<div class="container weekly-page">

  <div class="page-header">
    <h1>📅 Weekly Quests</h1>
    <p>Greater challenges. Greater rewards.</p>
  </div>

  <div class="grid grid-3">

    <div class="arcane-card quest-card">
      <h3>Workout Champion</h3>
      <p>Complete 5 workouts this week.</p>

      <div class="reward">+150 Strength XP</div>

      <button class="arcane-btn mt-2"
        onclick="completeQuest('strength',150)">
        Complete
      </button>
    </div>

    <div class="arcane-card quest-card">
      <h3>Knowledge Seeker</h3>
      <p>Read 100 pages this week.</p>

      <div class="reward">+150 Wisdom XP</div>

      <button class="arcane-btn mt-2"
        onclick="completeQuest('wisdom',150)">
        Complete
      </button>
    </div>

    <div class="arcane-card quest-card">
      <h3>Discipline Master</h3>
      <p>Maintain a 7-day streak.</p>

      <div class="reward">+150 Willpower XP</div>

      <div class="bonus">🏆 Weekly Title Progress</div>

      <button class="arcane-btn mt-2"
        onclick="completeQuest('willpower',150)">
        Complete
      </button>
    </div>

  </div>

  <div class="text-center mt-4">
    <a href="quest-board.html">
      <button class="arcane-btn">
        Back To Quest Board
      </button>
    </a>
  </div>

</div>

<script src="../js/storage.js"></script>
<script src="../js/utils.js"></script>

<script>
if(!characterExists()){
  window.location.href = "../create.html";
}

function completeQuest(stat,xp){

  addXP(stat,xp);

  alert(`Weekly Quest Complete!\n+${xp} ${capitalize(stat)} XP`);
}
</script>

</body>
</html>
