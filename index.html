<!DOCTYPE html>

<title>Arcane Self | Realms</title>

<link rel="stylesheet" href="../css/style.css">

<style>

}

}

      <a href="fitness.html">
        <button class="arcane-btn mt-2">

        </button>

    <div class="arcane-card realm-card">
      <div class="realm-icon">📚</div>

        <button class="arcane-btn mt-2">

        </button>
      </a>
    </div>

    <div class="arcane-card realm-card">
      <div class="realm-icon">🧘</div>

        <button class="arcane-btn mt-2">
          Enter
        </button>
      </a>
    </div>

    <div class="arcane-card realm-card">
      <div class="realm-icon">💰</div>

        <button class="arcane-btn mt-2">
          Enter
        </button>
      </a>
    </div>

      <div class="realm-icon">🎨</div>
      <h3>Creativity Realm</h3>
      <p>Ideas & Creation</p>

      <a href="creativity.html">
        <button class="arcane-btn mt-2">
          Enter
        </button>
      </a>
    </div>

  </div>

  <div class="text-center mt-4">

    <a href="../dashboard.html">
      <button class="arcane-btn">
        Return To Dashboard
      </button>
    </a>
