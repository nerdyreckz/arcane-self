<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Arcane Self | Dashboard</title>

<link rel="stylesheet" href="css/style.css">

<style>
.dashboard{
  padding:2rem 0;
}

.welcome-card{
  text-align:center;
  margin-bottom:2rem;
}

.character-avatar{
  font-size:4rem;
  margin-bottom:1rem;
}

.character-rank{
  margin-top:1rem;
}

.stats-grid{
  margin-top:2rem;
}

.checkin-card{
  margin-top:2rem;
}

.habit-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:1rem;
  margin-top:1rem;
}

.habit-btn{
  width:100%;
}

.top-nav{
  display:flex;
  gap:1rem;
  justify-content:center;
  margin-top:2rem;
  flex-wrap:wrap;
}

.power-score{
  font-size:2rem;
  color:var(--secondary);
  font-weight:700;
}

@media(max-width:768px){
  .habit-grid{
    grid-template-columns:1fr;
  }
}
</style>
</head>
<body>

<div class="container dashboard">

  <!-- CHARACTER -->

  <div class="arcane-card welcome-card">

    <div id="avatar" class="character-avatar">⚔️</div>

    <h1 id="characterName">Hunter</h1>

    <p id="characterClass">Class</p>

    <div class="character-rank">
      <span id="rankBadge" class="rank-badge">E Rank</span>
    </div>

    <div class="mt-3">
      <p>Power Level</p>
      <div id="powerLevel" class="power-score">0</div>
    </div>

  </div>

  <!-- STATS -->

  <div class="grid grid-3 stats-grid">

    <div class="arcane-card stat-card">
      <h3>Mana</h3>
      <div id="manaLevel" class="stat-level">1</div>
      <p id="manaXP">0 XP</p>
    </div>

    <div class="arcane-card stat-card">
      <h3>Strength</h3>
      <div id="strengthLevel" class="stat-level">1</div>
      <p id="strengthXP">0 XP</p>
    </div>

    <div class="arcane-card stat-card">
      <h3>Wisdom</h3>
      <div id="wisdomLevel" class="stat-level">1</div>
      <p id="wisdomXP">0 XP</p>
    </div>

    <div class="arcane-card stat-card">
      <h3>Vitality</h3>
      <div id="vitalityLevel" class="stat-level">1</div>
      <p id="vitalityXP">0 XP</p>
    </div>

    <div class="arcane-card stat-card">
      <h3>Willpower</h3>
      <div id="willpowerLevel" class="stat-level">1</div>
      <p id="willpowerXP">0 XP</p>
    </div>

    <div class="arcane-card stat-card">
      <h3>Total XP</h3>
      <div id="totalXP" class="stat-level">0</div>
      <p>Experience</p>
    </div>

  </div>

  <!-- DAILY CHECK IN -->

  <div class="arcane-card checkin-card">

    <h2>Daily Quest Board</h2>

    <p class="mt-1">
      Complete habits to gain +30 XP.
    </p>

    <div class="habit-grid">

      <button class="arcane-btn habit-btn"
        onclick="completeHabit('mana')">
        🧘 Meditation (+30 Mana XP)
      </button>

      <button class="arcane-btn habit-btn"
        onclick="completeHabit('strength')">
        💪 Workout (+30 Strength XP)
      </button>

      <button class="arcane-btn habit-btn"
        onclick="completeHabit('wisdom')">
        📚 Reading (+30 Wisdom XP)
      </button>

      <button class="arcane-btn habit-btn"
        onclick="completeHabit('vitality')">
        😴 Sleep (+30 Vitality XP)
      </button>

      <button class="arcane-btn habit-btn"
        onclick="completeHabit('willpower')">
        🔥 Discipline (+30 Willpower XP)
      </button>

    </div>

  </div>

  <!-- NAVIGATION -->

  <div class="top-nav">

    <a href="index.html">
      <button class="arcane-btn secondary">Home</button>
    </a>

    <a href="stats.html">
      <button class="arcane-btn">Stats</button>
    </a>

    <a href="rank.html">
      <button class="arcane-btn">Ranks</button>
    </a>

    
    <a href="profile.html"><button class="arcane-btn">Profile</button></a>

<a href="achievements.html"><button class="arcane-btn">Achievements</button></a>

<a href="titles.html"><button class="arcane-btn">Titles</button></a>

<a href="quests/quest-board.html"><button class="arcane-btn">Quests</button></a>

<a href="journal/journal.html"><button class="arcane-btn">Journal</button></a>

<a href="realms/index1.html">
    <button class="arcane-btn tit">Realms</button>
  </a>

<a href="customization/profile-showcase.html"><button class="arcane-btn">Customization</button></a>

<a href="hall-of-fame.html"><button class="arcane-btn">Hall of Fame</button></a>

<a href="legacy.html"><button class="arcane-btn">Legacy</button></a>

<a href="rebirth.html"><button class="arcane-btn">Rebirth</button></a>

<a href="settings.html"><button class="arcane-btn">Settings</button></a>

  </div>

</div>

<script src="js/storage.js"></script>
<script src="js/utils.js"></script>

<script>

if(!characterExists()){
  window.location.href = "create.html";
}

function loadDashboard(){

  const data = getData();

  document.getElementById("characterName").textContent =
    data.character.name;

  document.getElementById("characterClass").textContent =
    data.character.class;

  document.getElementById("avatar").textContent =
    data.character.avatar || "⚔️";

  document.getElementById("rankBadge").textContent =
    `${data.rank} Rank`;

  document.getElementById("totalXP").textContent =
    data.totalXP;

  document.getElementById("powerLevel").textContent =
    getPowerLevel();

  const stats = data.stats;

  document.getElementById("manaLevel").textContent =
    stats.mana.level;
  document.getElementById("manaXP").textContent =
    formatXP(stats.mana.xp);

  document.getElementById("strengthLevel").textContent =
    stats.strength.level;
  document.getElementById("strengthXP").textContent =
    formatXP(stats.strength.xp);

  document.getElementById("wisdomLevel").textContent =
    stats.wisdom.level;
  document.getElementById("wisdomXP").textContent =
    formatXP(stats.wisdom.xp);

  document.getElementById("vitalityLevel").textContent =
    stats.vitality.level;
  document.getElementById("vitalityXP").textContent =
    formatXP(stats.vitality.xp);

  document.getElementById("willpowerLevel").textContent =
    stats.willpower.level;
  document.getElementById("willpowerXP").textContent =
    formatXP(stats.willpower.xp);
}

function completeHabit(stat){

  addXP(stat,30);

  alert(`Quest Complete!\n+30 ${capitalize(stat)} XP`);

  loadDashboard();
}

loadDashboard();

</script>

</body>
</html>
